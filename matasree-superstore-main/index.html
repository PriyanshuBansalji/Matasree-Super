<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Matasree Super | Premium Indian Spices & Masalas</title>
    <meta name="description" content="Experience authentic Indian flavors with Matasree Super's premium spices and masalas. From Kashmiri Mirch to Garam Masala, bring restaurant-quality taste to your kitchen." />
    <meta name="keywords" content="Indian spices, masala, turmeric, chilli powder, garam masala, spice online, authentic spices India" />
    <meta name="author" content="Matasree Super" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Matasree Super | Premium Indian Spices & Masalas" />
    <meta property="og:description" content="Experience authentic Indian flavors with Matasree Super's premium spices and masalas." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://matasreesuper.com" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Matasree Super | Premium Indian Spices" />
    <meta name="twitter:description" content="Premium quality Indian spices delivered to your doorstep." />

    <!-- Structured Data JSON-LD Schema (Organization & WebSite) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://matasreesuper.com/#organization",
          "name": "Matasree Super",
          "url": "https://matasreesuper.com",
          "logo": "https://matasreesuper.com/logo.png",
          "description": "Authentic, premium quality Indian spices and masalas.",
          "telephone": "+91-XXXXXXXXXX",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Matasree Headquarters",
            "addressLocality": "India",
            "addressCountry": "IN"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://matasreesuper.com/#website",
          "url": "https://matasreesuper.com",
          "name": "Matasree Super",
          "publisher": {
            "@id": "https://matasreesuper.com/#organization"
          },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://matasreesuper.com/products?search={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
